name: Working memory consolidation

on:
  schedule:
    # 09:00 UTC daily ≈ 5am ET / 2am PT. Adjust if "morning home screen"
    # for a different timezone matters more.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      lookback:
        description: 'Lookback window in days'
        required: false
        default: '7'
      dry_run:
        description: 'Run prompt + validate but do not write'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: wm-consolidate
  cancel-in-progress: false

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Run consolidation for all active users
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS="--lookback ${{ inputs.lookback || '7' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npm run wm:consolidate:all -- $ARGS
